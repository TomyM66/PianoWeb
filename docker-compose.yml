version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: chopchopin_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chopchopin
      MYSQL_USER: chopuser
      MYSQL_PASSWORD: choppass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./back
    container_name: chopchopin_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: chopuser
      DB_PASSWORD: choppass
      DB_NAME: chopchopin
    depends_on:
      db:
        condition: service_healthy

  front:
    build: ./front
    container_name: chopchopin_front
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  db_data:
