            <div class="form-group">
                <label for="email">Votre email</label>
                <input type="email" id="email" placeholder="Entrez votre email">
            </div>

            <div class="form-group">
                <label for="code">Votre code</label>
                <input type="password" id="code" placeholder="Entrez votre code">

    <script>
        function connecter() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const messageEl = document.getElementById('message');

            // Vérification que tous les champs sont remplis
            if (!email || !code) {
                messageEl.textContent = 'Veuillez remplir tous les champs';
                messageEl.className = 'message error';
                messageEl.style.display = 'block';
                return;
            }

            // Stockage dans des variables pour l'API
            window.email = email;
            window.code = code;

            // Redirection vers la page ChopChopin
            window.location.href = 'chopchopin.html';
        }

        // Permettre la soumission avec la touche Entrée
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                connecter();
            }
        });
    </script>
</body>
