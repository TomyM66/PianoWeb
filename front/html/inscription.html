<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChopChopin - Inscription</title>
    <link rel="stylesheet" href="../css/style-c.css">
</head>
<body>
    <div class="container">
        <div class="inscription-card">
            <h1 class="title">Veuillez vous inscrire</h1>
            
            <div class="form-group">
                <label for="pseudo">Pseudo</label>
                <input type="text" id="pseudo" placeholder="Entrez votre pseudo">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Entrez votre email">
            </div>

            <div class="form-group">
                <label for="code">Code</label>
                <input type="password" id="code" placeholder="Entrez votre code">
            </div>

            <button class="btn" onclick="inscrire()">S'inscrire</button>

            <div id="message" class="message"></div>

            <a href="accueil.html" class="link-back">Retour à l'accueil</a>
        </div>
    </div>

    <script>
        function inscrire() {
            const pseudo = document.getElementById('pseudo').value;
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const messageEl = document.getElementById('message');

            if (!pseudo || !email || !code) {
                messageEl.textContent = 'Veuillez remplir tous les champs';
                messageEl.className = 'message error';
                messageEl.style.display = 'block';
                return;
            }

            window.pseudo = pseudo;
            window.email = email;
            window.code = code;

            messageEl.textContent = 'Inscription réussie !';
            messageEl.className = 'message success';
            messageEl.style.display = 'block';

            document.getElementById('pseudo').value = '';
            document.getElementById('email').value = '';
            document.getElementById('code').value = '';

            setTimeout(() => {
                window.location.href = 'accueil.html';
            }, 2000);
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                inscrire();
            }
        });
    </script>
</body>
</html>
